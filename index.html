<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080818">
<!-- CSP 已移除 style-src 'unsafe-inline' -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://macaumarksix.com https://history.macaumarksix.com https://vv.video.qq.com https://time.akamai.com; img-src * data:;">
<meta name="referrer" content="no-referrer-when-downgrade">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta http-equiv="Cache-Control" content="max-age=3600">
<meta name="description" content="神玛再现 · 杀码助手，支持频次分析、实时开奖、历史查询">
<title>神码再现 v3.7.14 · 严格 CSP 版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- 请将 integrity 值替换为你实际生成的 SHA-384 -->
<link rel="stylesheet" href="style.css" integrity="sha384-o6vH1oA4AQUL5SK9wrCKHcSBmekx30d2kns0uFwpMm/RovJd9eX227cfUTZAgoWA" crossorigin="anonymous">
</head>
<body class="mech-grid text-gray-300 overflow-x-hidden">

<!-- 启动画面 -->
<div id="splash-screen">
  <div id="loader-screen">
    <div class="title-container" id="text-scramble"></div>
    <div class="progress-wrapper">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="loading-text" id="loading-text">SYSTEM INITIALIZING... 0%</div>
  </div>
</div>

<!-- 主应用 -->
<div id="main-app">
  <main class="relative z-10 max-w-4xl mx-auto p-3">
    <header class="relative rounded-t-xl bg-gradient-to-r from-[#00ffea]/20 via-[#9d00ff]/20 to-[#ff0055]/20 border-b border-[#00ffea]/30 py-2 text-center">
      <div id="settingsWrapper">
        <button type="button" id="settingsBtn" aria-label="设置" title="设置">
          <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19.14 12.94a7.07 7.07 0 0 0 0-1.88l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.04 7.04 0 0 0-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84a.49.49 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58a7.07 7.07 0 0 0 0 1.88l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.49.37 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.22 0 .43-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1 1 15.6 12 3.6 3.6 0 0 1 12 15.6z"/></svg>
        </button>
        <div id="settingsDropdown" class="hidden">
          <div class="menu-item disabled" id="settingsTheme">
            <span class="menu-label">🎨 主题</span>
            <span class="menu-badge">待开发</span>
          </div>
          <div class="menu-item" id="settingsFreqAdj">
            <span class="menu-label">📊 频次动态调整</span>
            <label class="toggle-switch">
              <input type="checkbox" id="freqAdjToggle" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>
      <h1 class="relative z-10 text-3xl font-black bg-gradient-to-r from-[#00ffea] via-[#ff0055] to-[#9d00ff] bg-clip-text text-transparent tracking-wider whitespace-nowrap text-[26px]">神码再现</h1>
      <p class="relative z-10 text-sm text-gray-400 mt-2 tracking-widest">命中衰减 · 频次动态调整</p>
    </header>

    <section class="border-x border-b border-[#00ffea]/30 p-4 rounded-b-xl">
      <textarea id="numbers" rows="3" maxlength="15000" class="w-full bg-transparent border border-[#00ffea]/30 rounded-lg p-3 text-[#00ffea] font-mono text-sm resize-y min-h-[100px] focus:outline-none focus:border-[#00ffea] transition-all" placeholder="输入号码或生肖，例如: 12 25 36 龙蛇马 8 17 29 41"></textarea>
      <div class="flex justify-between items-center mt-2 text-xs text-gray-500 font-mono">
        <span>智能分析引擎 <span class="text-emerald-400 text-[10px]">(防抖200ms · 上限5000个号码)</span></span>
        <div class="flex gap-3"><span>有效: <span id="charCount" class="text-[#00ffea] font-bold">0</span></span><span id="numberWarn" class="text-red-400 hidden">⚠️ 已截断至5000个</span></div>
      </div>
      <div class="flex gap-2 mt-4">
        <button type="button" id="exampleBtn" aria-label="加载示例数据" class="flex-1 bg-transparent border border-[#00ffea]/50 text-[#00ffea] py-2 px-4 rounded-lg text-sm font-semibold hover:bg-[#00ffea]/10 transition-all active:scale-95 flex items-center justify-center gap-2"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 16 16"><path d="M13 3H3v2h10V3zm0 4H3v2h10V7zm0 4H3v2h10v-2z"/></svg>示例</button>
        <button type="button" id="clearBtn" aria-label="清除输入内容" class="flex-1 bg-transparent border border-[#ff0055]/50 text-[#ff0055] py-2 px-4 rounded-lg text-sm font-semibold hover:bg-[#ff0055]/10 transition-all active:scale-95 flex items-center justify-center gap-2"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 16 16"><path d="M8 0a8 8 0 100 16A8 8 0 008 0zm3 10.5L10.5 12 8 9.5 5.5 12 5 10.5 7.5 8 5 5.5 5.5 4 8 6.5 10.5 4l.5 1.5L8.5 8z"/></svg>清除输入</button>
      </div>
    </section>

    <section class="mt-4 border border-[#00ffea]/20 rounded-xl p-2">
      <div class="flex justify-between items-center mb-4"><h2 class="text-lg font-bold bg-gradient-to-r from-[#00ffea] to-[#ff0055] bg-clip-text text-transparent">分析结果</h2><button type="button" id="copyResultBtn" aria-label="复制分析结果" class="bg-gradient-to-r from-[#00ff88]/80 to-emerald-600/80 text-black py-2 px-4 rounded-lg text-sm font-bold hover:shadow-[0_0_20px_rgba(0,255,136,0.6)] transition-all active:scale-95 flex items-center gap-2"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 16 16"><path d="M4 2v12h8v2H2V2h2zm10 0v12h2V2h-2zm-2 0H6v12h6V2z"/></svg>复制</button></div>
      <div id="result" class="min-h-[200px]"><div class="flex flex-col items-center justify-center py-12 text-gray-500"><svg class="w-20 h-20 mb-4 opacity-50" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" stroke="#00ffea" stroke-width="2" fill="none" stroke-dasharray="5,5"/><path d="M30 50l15 15 25-30" stroke="#00ffea" stroke-width="3" fill="none" stroke-linecap="round"/></svg><p>输入号码启动分析</p></div></div>
    </section>

    <section class="mt-4 lottery-card border border-[#00ffea]/20 rounded-xl">
      <div class="flex justify-between items-start mb-4"><div><div class="text-gray-400 text-sm mb-1">第 <span id="lotteryPeriod" class="text-gray-300">--</span> 期</div></div><div class="text-right"><div class="text-gray-400 text-sm mb-1">开奖时间</div><div id="lotteryTime" class="text-gray-300 text-sm">--</div><div id="lastRefreshTime" class="text-xs text-gray-500 mt-1"></div></div></div>
      <div class="border-t border-gray-700/50 my-4"></div>
      <div id="lotteryBalls" class="flex justify-center flex-wrap gap-1"></div>
      <button type="button" id="refreshLotteryBtn" aria-label="刷新开奖数据" class="refresh-btn-orange"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>刷新数据</button>
    </section>
  </main>

  <footer class="mt-6 text-center text-xs text-gray-600 tracking-widest pb-4">杀码助手仅供港澳居民使用</footer>

  <nav class="bottom-nav" role="navigation" aria-label="主菜单">
    <div class="flex gap-1 overflow-x-auto hide-scrollbar">
      <button type="button" class="nav-item" data-drawer="shama" role="button" aria-label="杀码筛选">杀码</button>
      <button type="button" class="nav-item" data-drawer="shengxiao" role="button" aria-label="生肖筛选">生肖</button>
      <button type="button" class="nav-item" data-drawer="haomatou" role="button" aria-label="头数筛选">头数</button>
      <button type="button" class="nav-item" data-drawer="weishu" role="button" aria-label="尾数筛选">尾数</button>
      <button type="button" class="nav-item" data-drawer="shuduan" role="button" aria-label="数段筛选">数段</button>
      <button type="button" class="nav-item" data-drawer="bose" role="button" aria-label="波色筛选">波色</button>
      <button type="button" class="nav-item" data-drawer="wuxing" role="button" aria-label="五行筛选">五行</button>
      <button type="button" class="nav-item" data-drawer="heshu" role="button" aria-label="合数筛选">合数</button>
      <button type="button" class="nav-item" data-drawer="bandanshuang" role="button" aria-label="单双筛选">单双</button>
      <button type="button" class="nav-item" data-drawer="history" role="button" aria-label="历史开奖">历史</button>
      <button type="button" class="nav-item" data-drawer="selectnone" role="button" aria-label="清空所有筛选">清空</button>
    </div>
  </nav>

  <div id="drawer-overlay" class="fixed inset-0 bg-black/30 z-40 hidden opacity-0 transition-opacity duration-300" role="presentation"></div>
  <div id="drawer-container" class="drawer-mobile" role="dialog" aria-modal="true" aria-label="筛选器抽屉">
    <div class="drawer-header"><h3 id="drawer-title">筛选器</h3><button type="button" id="drawer-close" class="drawer-close-btn" aria-label="关闭抽屉"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></div>
    <div id="drawer-content" class="p-4 space-y-4 pb-20 bg-[#0a0a12]"></div>
  </div>
  <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-[#0a0a12] border border-[#00ffea]/30 text-[#00ffea] px-6 py-3 rounded-lg shadow-[0_0_20px_rgba(0,255,234,0.3)] transform translate-y-20 opacity-0 transition-all duration-300 z-[200] pointer-events-none" role="alert" aria-live="polite"></div>
</div>

<!-- 外部脚本，添加 SRI（请替换 app.js 的哈希值） -->
<script src="app.js" integrity="sha384-mbOOEM/MmYssr9YCBPY18QdKNxEovejHvPuVKJ8XLs7a73vB1VwpiHOijj8Nrh0b" crossorigin="anonymous"></script>
</body>
</html>
