<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>神码再现 v3.6 · 稳定版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-[#050816] text-gray-100">
  <div class="min-h-screen flex flex-col">
    <!-- 顶部标题 -->
    <header class="border-b border-white/5 px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-[#00ffea] animate-pulse"></div>
        <h1 class="text-sm sm:text-base font-semibold tracking-wide">
          神码再现 v3.6 · 稳定版
        </h1>
      </div>
      <div class="text-xs text-white/50">
        生肖自动跨年 · 五行/波色/数段 · Worker 加速
      </div>
    </header>

    <!-- 主体 -->
    <main class="flex-1 px-4 py-4 max-w-5xl mx-auto w-full">
      <!-- 输入区 -->
      <section class="mb-4">
        <div class="flex items-center justify-between mb-2">
          <div class="text-xs text-white/60">
            输入号码 / 生肖（支持：数字、鼠牛虎兔龙蛇马羊猴鸡狗猪）
          </div>
          <div class="flex items-center gap-3 text-xs text-white/60">
            <span>展开次数：<span id="charCount">0</span></span>
            <span id="numberWarn" class="hidden text-[#ff4b81]">
              已截断至 5000 组
            </span>
          </div>
        </div>
        <textarea
          id="numbers"
          class="w-full h-32 rounded-md bg-black/40 border border-white/10 px-3 py-2 text-sm outline-none focus:border-[#00ffea] resize-none"
          placeholder="例如：12 25 36 龙蛇马 8 17 29 41"
        ></textarea>
        <div class="mt-2 flex flex-wrap gap-2 text-xs">
          <button
            id="exampleBtn"
            class="px-3 py-1 rounded border border-white/10 bg-white/5 hover:bg-white/10 transition"
          >
            示例
          </button>
          <button
            id="clearBtn"
            class="px-3 py-1 rounded border border-white/10 bg-white/5 hover:bg-white/10 transition"
          >
            清空
          </button>
          <button
            id="copyResultBtn"
            class="px-3 py-1 rounded border border-[#00ffea]/40 text-[#00ffea] bg-[#00ffea]/5 hover:bg-[#00ffea]/10 transition"
          >
            复制结果
          </button>
        </div>
      </section>

      <!-- 结果区 -->
      <section class="mt-4">
        <div class="flex items-center justify-between mb-2">
          <div class="text-xs text-white/60">频次结果（1–49）</div>
        </div>
        <div
          id="result"
          class="rounded-md border border-white/10 bg-black/40 px-3 py-3 text-xs min-h-[120px]"
        >
          <div class="py-12 text-center text-gray-500">暂无数据</div>
        </div>
      </section>
    </main>

    <!-- 底部 -->
    <footer class="px-4 py-3 border-t border-white/5 text-[10px] text-white/40 text-center">
      神码再现 v3.6 · 自动生肖 · 本地计算 · 无服务器依赖
    </footer>
  </div>

  <!-- 抽屉（预留，与你原版结构兼容） -->
  <div
    id="drawer-overlay"
    class="fixed inset-0 bg-black/60 hidden"
  ></div>
  <div
    id="drawer-container"
    class="fixed right-0 top-0 h-full w-full max-w-md bg-[#050816] border-l border-white/10 hidden"
  >
    <div class="flex items-center justify-between px-4 py-3 border-b border-white/10">
      <div id="drawer-title" class="text-sm font-semibold">详情</div>
      <button id="drawer-close" class="text-white/60 text-xs">关闭</button>
    </div>
    <div id="drawer-content" class="p-4 text-xs text-white/70 overflow-y-auto h-[calc(100%-44px)]">
    </div>
  </div>

  <!-- Toast -->
  <div
    id="toast"
    class="fixed left-1/2 -translate-x-1/2 bottom-6 px-4 py-2 rounded bg-black/80 text-xs text-white/90 border border-white/10 opacity-0 translate-y-20 transition-all duration-300"
  >
    提示
  </div>

  <!-- 脚本顺序：先数据，再主逻辑 -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
